name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *'   # todos os dias às 8h UTC
  workflow_dispatch:        # permite correr manualmente

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Insert and delete keepalive row
        run: |
          # INSERT uma linha de keepalive
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/readings" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{"meter_value": -1, "note": "keepalive", "car": "keepalive"}'

          sleep 2

          # DELETE a linha de keepalive imediatamente
          curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/readings?note=eq.keepalive&car=eq.keepalive" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"

  keepalive-workflow:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
